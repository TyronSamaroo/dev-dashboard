<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping List — Tyron & Tiffany</title>
<style>
:root {
  --bg: #fafafa; --surface: #ffffff; --border: #e5e7eb;
  --text: #111827; --text-muted: #6b7280; --accent: #059669; --accent-bg: #d1fae5;
  --warn-bg: #fef3c7; --warn-border: #fcd34d; --warn-text: #92400e;
  --danger: #dc2626;
}
[data-theme="dark"] {
  --bg: #0a0a0f; --surface: #12121a; --border: #2a2a3a;
  --text: #e8e8f0; --text-muted: #8888a0; --accent: #34d399; --accent-bg: rgba(52,211,153,0.15);
  --warn-bg: rgba(245,158,11,0.1); --warn-border: rgba(245,158,11,0.4); --warn-text: #f59e0b;
  --danger: #f87171;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; }
.container { max-width: 720px; margin: 0 auto; padding: 24px 20px 80px; }

/* Login */
#gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.gate-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px 28px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
.gate-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.gate-card p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
.google-btn { width: 100%; padding: 12px; background: #fff; color: #1f2937; border: 1px solid #d1d5db; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; }
.google-btn:hover { background: #f9fafb; }
.google-btn svg { width: 18px; height: 18px; }
.err { color: var(--danger); font-size: 13px; margin-top: 14px; min-height: 18px; }

/* Main */
#app { display: none; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.topbar h1 { font-size: 24px; font-weight: 700; }
.topbar-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 24px; }
.user-row { display: flex; align-items: center; gap: 8px; }
.user-row span { font-size: 12px; color: var(--text-muted); }
.icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; padding: 0; }
.icon-btn:hover { color: var(--text); border-color: var(--text-muted); }
.icon-btn svg { width: 14px; height: 14px; }
.text-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit; }
.text-btn:hover { color: var(--text); border-color: var(--text-muted); }

.nav { display: inline-flex; gap: 4px; background: #f3f4f6; padding: 4px; border-radius: 10px; margin-bottom: 24px; }
[data-theme="dark"] .nav { background: var(--surface); }
.nav-link { padding: 8px 16px; border-radius: 8px; color: var(--text-muted); font-size: 13px; font-weight: 500; text-decoration: none; transition: color 0.15s; }
.nav-link:hover:not(.active) { color: var(--text); }
.nav-link.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
[data-theme="dark"] .nav-link.active { background: var(--surface-alt, var(--bg)); }
.section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin: 28px 0 12px; }
.section-title:first-of-type { margin-top: 0; }

.store-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 4px 0; margin-bottom: 12px; overflow: hidden; }
.store-header { font-size: 15px; font-weight: 600; color: var(--accent); padding: 14px 18px 10px; display: flex; align-items: center; gap: 10px; }
.store-icon { width: 22px; height: 22px; border-radius: 6px; background: var(--accent-bg); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 18px; border-top: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
.item:hover { background: var(--bg); }
.item input[type="checkbox"] { margin-top: 2px; cursor: pointer; accent-color: var(--accent); width: 18px; height: 18px; flex-shrink: 0; }
.item label { flex: 1; cursor: pointer; font-size: 15px; line-height: 1.4; }
.item.done label { text-decoration: line-through; color: var(--text-muted); }

.trip-grid { display: grid; gap: 10px; }
.trip-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; }
.trip-card .label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.trip-stops { display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
.trip-stop { display: flex; align-items: center; gap: 10px; }
.trip-stop-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent-bg); color: var(--accent); font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.trip-route-text { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
.est-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
.est-row:last-child { border-bottom: none; }
.est-row .label-text { color: var(--text-muted); }
.est-row .amount { color: var(--text); font-weight: 500; }
.total-card { background: var(--accent-bg); border: none; border-radius: 12px; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.total-card .label-text { font-size: 12px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
.total-card .total-amount { font-size: 18px; font-weight: 700; color: var(--accent); }
.heads-up { background: var(--warn-bg); border-left: 3px solid var(--warn-border); border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 13px; color: var(--warn-text); margin-top: 10px; line-height: 1.5; }
.empty { color: var(--text-muted); font-size: 14px; padding: 16px; text-align: center; }
.footer { text-align: center; margin-top: 32px; color: var(--text-muted); font-size: 11px; }
.footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body data-theme="light">

<div id="gate">
  <div class="gate-card">
    <h1>Shopping List</h1>
    <p>Tyron &amp; Tiffany only — sign in with your Google account.</p>
    <button class="google-btn" id="signin-btn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<div id="app">
  <div class="container">
    <div class="topbar">
      <h1>Shopping List</h1>
      <div class="user-row">
        <span id="user-email"></span>
        <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme"><svg id="theme-icon" viewBox="0 0 24 24" fill="currentColor"></svg></button>
        <button class="text-btn" id="signout-btn">Sign out</button>
      </div>
    </div>
    <div class="topbar-meta" id="meta">Loading…</div>

    <nav class="nav">
      <a href="/grocery/" class="nav-link">Spending</a>
      <a href="/grocery/shopping-list/" class="nav-link active">Shopping list</a>
    </nav>

    <div class="section-title">Need now</div>
    <div id="need-now"></div>

    <div class="section-title">Restock soon</div>
    <div id="restock"></div>

    <div class="section-title" id="mom-title" style="display:none;">For Tiffany's mom <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-faint, #9ca3af);">— separate from your budget</span></div>
    <div id="mom-list"></div>

    <div class="section-title">Trip planning</div>
    <div class="trip-grid" id="trip"></div>

    <div class="footer">View spending dashboard at <a href="/grocery/">tyronsamaroo.dev/grocery</a></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3OoGfTpHI7Ht0_q6fxpuF6ELIijYOGKs",
  authDomain: "tyron-personal.firebaseapp.com",
  projectId: "tyron-personal",
  appId: "1:904054560395:web:fe39d677cacaf0eb05a68e"
};
const ALLOWED_EMAILS = ["tyronsamaroo828@gmail.com", "tiffanysamaroo721@gmail.com"];

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const gate = document.getElementById('gate');
const appEl = document.getElementById('app');
const errEl = document.getElementById('login-err');
const userEmailEl = document.getElementById('user-email');
const metaEl = document.getElementById('meta');

const SUN_PATH = '<path d="M12 17.5a5.5 5.5 0 110-11 5.5 5.5 0 010 11zM12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>';
const MOON_PATH = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';

function applyTheme(theme) {
  document.body.setAttribute('data-theme', theme);
  document.getElementById('theme-icon').innerHTML = theme === 'light' ? MOON_PATH : SUN_PATH;
  try { localStorage.setItem('grocery_theme', theme); } catch(e) {}
}
let savedTheme = 'light';
try { savedTheme = localStorage.getItem('grocery_theme') || 'light'; } catch(e) {}
applyTheme(savedTheme);
document.getElementById('theme-toggle').addEventListener('click', () => {
  applyTheme(document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
});

document.getElementById('signin-btn').addEventListener('click', async () => {
  errEl.textContent = '';
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    errEl.textContent = 'Sign-in failed: ' + (e.message || e.code);
  }
});
document.getElementById('signout-btn').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, async (user) => {
  if (user && ALLOWED_EMAILS.includes(user.email)) {
    gate.style.display = 'none';
    appEl.style.display = 'block';
    userEmailEl.textContent = user.email;
    await loadAndRender();
  } else if (user) {
    errEl.textContent = `${user.email} is not authorized`;
    setTimeout(() => signOut(auth), 1500);
  } else {
    gate.style.display = 'flex';
    appEl.style.display = 'none';
  }
});

const escapeHtml = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

async function loadAndRender() {
  try {
    const res = await fetch('/grocery/data.json', { cache: 'no-cache' });
    const data = await res.json();
    const sl = data.shoppingList || {};

    if (data.generatedAt) {
      const d = new Date(data.generatedAt);
      metaEl.textContent = 'Updated ' + d.toLocaleString();
    }

    const need = document.getElementById('need-now');
    const stores = sl.needNow || [];
    if (!stores.length) {
      need.innerHTML = '<div class="empty">Nothing on the list right now 🌱</div>';
    } else {
      need.innerHTML = stores.map(s => {
        const initial = s.store.replace(/[^A-Za-z]/g, '').slice(0, 2).toUpperCase() || '·';
        return `
          <div class="store-card">
            <div class="store-header"><span class="store-icon">${initial}</span>${escapeHtml(s.store)}</div>
            ${s.items.map((it, i) => {
              const id = 'n-' + s.store.replace(/\W/g, '') + '-' + i;
              return `<div class="item${it.done ? ' done' : ''}" onclick="document.getElementById('${id}').click()">
                <input type="checkbox" id="${id}" ${it.done ? 'checked' : ''} onclick="event.stopPropagation();this.closest('.item').classList.toggle('done', this.checked)">
                <label for="${id}" onclick="event.stopPropagation()">${escapeHtml(it.name)}</label>
              </div>`;
            }).join('')}
          </div>
        `;
      }).join('');
    }

    const restock = sl.restockSoon || [];
    document.getElementById('restock').innerHTML = restock.length ? `
      <div class="store-card">
        ${restock.map((it, i) => `<div class="item${it.done ? ' done' : ''}" onclick="document.getElementById('r-${i}').click()">
          <input type="checkbox" id="r-${i}" ${it.done ? 'checked' : ''} onclick="event.stopPropagation();this.closest('.item').classList.toggle('done', this.checked)">
          <label for="r-${i}" onclick="event.stopPropagation()">${escapeHtml(it.name)}</label>
        </div>`).join('')}
      </div>` : '<div class="empty">Nothing flagged for restock.</div>';

    // Mom's care package — only show section if there are items
    const mom = sl.momList || [];
    const momTitleEl = document.getElementById('mom-title');
    const momListEl = document.getElementById('mom-list');
    if (mom.length) {
      momTitleEl.style.display = 'block';
      momListEl.innerHTML = `
        <div class="store-card" style="border-left: 3px solid #db2777;">
          ${mom.map((it, i) => `<div class="item${it.done ? ' done' : ''}" onclick="document.getElementById('mom-${i}').click()">
            <input type="checkbox" id="mom-${i}" ${it.done ? 'checked' : ''} onclick="event.stopPropagation();this.closest('.item').classList.toggle('done', this.checked)" style="accent-color: #db2777;">
            <label for="mom-${i}" onclick="event.stopPropagation()">${escapeHtml(it.name)}</label>
          </div>`).join('')}
        </div>`;
    } else {
      momTitleEl.style.display = 'none';
      momListEl.innerHTML = '';
    }

    const t = sl.trip || {};
    const tripEl = document.getElementById('trip');
    let tripHtml = '';
    if (t.stops?.length) {
      tripHtml += `<div class="trip-card"><div class="label">Stops</div><div class="trip-stops">${t.stops.map((s, i) => `<div class="trip-stop"><span class="trip-stop-num">${i+1}</span><span>${escapeHtml(s)}</span></div>`).join('')}</div></div>`;
    }
    if (t.route?.length) {
      tripHtml += `<div class="trip-card"><div class="label">Route</div><div class="trip-route-text">${t.route.map(escapeHtml).join('<br>')}</div></div>`;
    }
    if (t.estimates?.length) {
      tripHtml += `<div class="trip-card"><div class="label">Estimated spend</div>${t.estimates.map(e => {
        const m = e.match(/^(.+?):\s*(.+)$/);
        return m ? `<div class="est-row"><span class="label-text">${escapeHtml(m[1])}</span><span class="amount">${escapeHtml(m[2])}</span></div>` : `<div class="est-row"><span class="label-text">${escapeHtml(e)}</span></div>`;
      }).join('')}</div>`;
      if (t.totalEstimate) {
        tripHtml += `<div class="total-card"><span class="label-text">Total estimate</span><span class="total-amount">${escapeHtml(t.totalEstimate)}</span></div>`;
      }
    }
    if (t.notes?.length) {
      tripHtml += t.notes.map(n => `<div class="heads-up">${escapeHtml(n)}</div>`).join('');
    }
    tripEl.innerHTML = tripHtml || '<div class="empty">No trip planning yet.</div>';
  } catch (e) {
    metaEl.textContent = 'Error loading data: ' + e.message;
    console.error(e);
  }
}
</script>
</body>
</html>
