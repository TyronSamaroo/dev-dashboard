<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Unlock This Week's Build</title>
<style>
:root { --ink:#172033; --cream:#fffaf0; --muted:#9aa6b8; --line:rgba(255,250,240,.18); --gold:#c48936; --green:#2f7d57; --danger:#ffb4a7; }
* { box-sizing:border-box; }
body { margin:0; min-height:100svh; display:grid; place-items:center; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--cream); background:radial-gradient(circle at 78% 20%, rgba(196,137,54,.34), transparent 30%), radial-gradient(circle at 20% 80%, rgba(47,125,87,.24), transparent 32%), #121a29; }
main { width:min(92vw, 560px); padding:34px; border:1px solid var(--line); border-radius:22px; background:rgba(18,26,41,.78); box-shadow:0 26px 100px rgba(0,0,0,.34); backdrop-filter:blur(16px); animation:rise .55s ease-out both; }
p { color:rgba(255,250,240,.74); line-height:1.55; }
.eyebrow { margin:0 0 12px; text-transform:uppercase; letter-spacing:.14em; font-size:.76rem; font-weight:850; color:var(--muted); }
h1 { margin:0; font-size:clamp(2.4rem, 10vw, 4.8rem); line-height:.9; letter-spacing:0; }
.panel { display:grid; gap:12px; margin-top:26px; }
form { display:grid; gap:12px; }
label { color:rgba(255,250,240,.82); font-weight:800; }
input { width:100%; border:1px solid rgba(255,250,240,.24); border-radius:14px; background:rgba(255,250,240,.08); color:var(--cream); padding:15px 16px; font:inherit; outline:none; }
input:focus { border-color:var(--gold); box-shadow:0 0 0 4px rgba(196,137,54,.18); }
button { border:0; border-radius:14px; padding:15px 16px; font:inherit; font-weight:900; color:#101722; background:var(--cream); cursor:pointer; }
button:hover { background:#fff2d2; }
button:disabled { opacity:.62; cursor:wait; }
.secondaryButton { border:1px solid rgba(255,250,240,.22); color:var(--cream); background:rgba(255,250,240,.08); }
.secondaryButton:hover { background:rgba(255,250,240,.14); }
.status { min-height:1.4em; margin:4px 0 0; color:var(--danger); }
.signedIn { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:10px; margin:0 0 18px; padding:12px 14px; border:1px solid rgba(255,250,240,.16); border-radius:14px; background:rgba(255,250,240,.06); color:rgba(255,250,240,.76); font-size:.92rem; }
.signedIn span { overflow-wrap:anywhere; }
.signedIn button { width:auto; padding:9px 12px; font-size:.82rem; }
.hidden { display:none !important; }
.hint { margin-top:18px; font-size:.92rem; color:rgba(255,250,240,.58); }
@keyframes rise { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>

  <p class="eyebrow">Private page</p>
  <h1>Unlock this week's build</h1>
  <p>This page is unlisted, Gmail-gated, and encrypted. Sign in with an allowed Google account, then enter the passphrase Tyron shared with you.</p>
  <section id="signinSection" class="panel">
    <button id="signinButton" type="button">Sign in with Google</button>
    <p id="loginStatus" class="status" role="status"></p>
  </section>
  <section id="unlockSection" class="panel hidden">
    <p class="signedIn">
      <span>Signed in as <strong id="userEmail"></strong></span>
      <button id="signoutButton" class="secondaryButton" type="button">Use different account</button>
    </p>
    <form id="unlockForm">
      <input name="username" type="text" autocomplete="username" value="private-share" hidden>
      <label for="passphrase">Passphrase</label>
      <input id="passphrase" name="passphrase" type="password" autocomplete="current-password">
      <button id="unlockButton" type="submit">Unlock page</button>
      <p id="status" class="status" role="status"></p>
    </form>
  </section>
  <p class="hint">Tip: the passphrase is separate from this link.</p>
</main>

function showSignin(message = '') {
  signinSection.classList.remove('hidden');
  unlockSection.classList.add('hidden');
  signinButton.disabled = false;
  loginStatusEl.textContent = message;
  statusEl.textContent = '';
}

function showUnlock(user) {
  signinSection.classList.add('hidden');
  unlockSection.classList.remove('hidden');
  userEmailEl.textContent = user.email || '';
  loginStatusEl.textContent = '';
  setTimeout(() => passphraseInput.focus(), 40);
}

  } catch (error) {
    signinButton.disabled = false;
    loginStatusEl.textContent = 'Google sign-in failed. Try again.';
  }
});

signoutButton.addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    showSignin(nextLoginMessage);
    nextLoginMessage = '';
    return;
  }

  const email = (user.email || '').toLowerCase();
  if (ALLOWED_EMAILS.includes(email)) {
    showUnlock(user);
    return;
  }

  nextLoginMessage = `${user.email || 'This Google account'} is not authorized for this page.`;
  await signOut(auth);
});

async function unlock(passphrase) {
  const enc = new TextEncoder();
  const dec = new TextDecoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b64ToBytes(payload.salt), iterations:payload.iterations, hash:'SHA-256' },
    keyMaterial,
    { name:'AES-GCM', length:256 },
    false,
    ['decrypt']
  );
  const plaintext = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64ToBytes(payload.iv) }, key, b64ToBytes(payload.data));
  return dec.decode(plaintext);
}
form.addEventListener('submit', async (event) => {
  event.preventDefault();
  const passphrase = passphraseInput.value;
  if (!passphrase) return;
  statusEl.textContent = 'Unlocking...';
  button.disabled = true;
  try {
    const html = await unlock(passphrase);
    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    statusEl.textContent = 'That passphrase did not unlock the page.';
    button.disabled = false;
  }
});
</script>
</body>
